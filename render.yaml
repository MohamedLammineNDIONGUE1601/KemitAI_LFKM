# Fichier de déploiement automatique pour Render.com
services:
  - type: web
    name: chatbot-serie-s-fadel-kane
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # à saisir dans le dashboard Render
      - key: FLASK_SECRET_KEY
        generateValue: true
    plan: free
